<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sinemata</title>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />
</head>

<body class="bg-[#14181C]">
    <!-- Navbar -->
    <nav class="navbar bg-[#1C2127] w-full py-5">
        <div class="wrapper max-w-7xl mx-auto flex items-center justify-between">
            <!-- Logo -->
            <div class="logo-nav flex items-center gap-25">
                <div class="logo font-bebas text-[22px] text-white">
                    <a href="#">SINEMATA</a>
                </div>

                <!-- Navigation -->
                <ul class="nav-links font-inter text-sm text-[#9CA3AF] flex gap-7">
                    <li><a href="#" class="hover:text-white">Home</a></li>
                    <li><a href="#" class="hover:text-white">Browse</a></li>
                    <li><a href="#" class="hover:text-white">Watchlist</a></li>
                    <li><a href="#" class="hover:text-white">My Reviews</a></li>
                </ul>
            </div>

            <!-- Profile -->
            <div class="profile w-[36px] h-[36px] bg-[#FF8000] rounded-full"></div>
        </div>
    </nav>

    <!-- Hero -->
    <div
        class="mt-4 rounded-lg p-12 hero max-w-7xl mx-auto bg-linear-to-br from-[#2A1810] via-[#1A1F2E] to-[#0F1419] flex flex-col">
        <div
            class="bades-featured bg-[#FF80002E]/18 w-fit text-[#FF8000] border border-[#FF800066]/40 rounded-md py-1 px-2">
            <p class="font-inter text-[10px] font-bold">FEATURED THIS WEEK</p>
        </div>

        <div class="title mt-4 max-w-[427px]">
            <h1 class="font-bebas text-white text-6xl leading-none">
                CHRONOS LETTERBOUND
            </h1>
        </div>

        <div class="rating-genres flex gap-3 font-inter text-xs mt-4">
            <p class="text-[#FBBF24]">★ 8.7</p>
            <p class="text-[#9CA3AF]">2024 · 2h 18m · Sci-Fi · Drama</p>
        </div>

        <div class="synopsis max-w-[427px]">
            <p class="font-inter text-sm text-[#9CA3AF] mt-4 leading-6">
                Seorang penjaga arsip menemukan surat-surat dari masa depan yang
                ditulis untuknya — masing-masing meminta keputusan mustahil.
            </p>
        </div>

        <div class="actions mt-5 flex gap-3">
            <button
                class="btn-detail font-inter text-sm text-[#14181C] font-bold py-3 px-6 bg-amber-600 hover:bg-amber-700 transition rounded-lg cursor-pointer">
                ▶ Lihat Detail
            </button>
            <button
                class="btn-watchlist font-inter text-sm text-white font-bold py-3 px-6 bg-white/10 hover:bg-white/20 transition rounded-lg cursor-pointer">
                + Watchlist
            </button>
        </div>

        <script src="script.js"></script>
</body>

</html>
